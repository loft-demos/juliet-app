apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: preview-app
  namespace: p-auth-core
spec:
  inputsFrom:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSetInputProvider
      name: preview-pull-requests
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      metadata:
        name: juliet-app-preview-flux-vcluster-<< inputs.id >>
        namespace: p-auth-core
      spec:
        provider: generic # or 'github' if using GitHub App
        interval: 1h
        url: https://github.com/loft-demos/juliet-app
        ref:
          branch: << inputs.branch >>
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: juliet-app-preview-flux-vcluster-<< inputs.id >>
        namespace: p-auth-core
      spec:
        interval: 1m
        targetNamespace: p-auth-core
        sourceRef:
          kind: GitRepository
          name: juliet-app-preview-flux-vcluster-<< inputs.id >>
        path: "./vcluster-gitops/argocd/flux/pull-request-environments/kustomize"
        prune: true
        timeout: 2m
        wait: true
        # important: this feature requires Flux 2.5+
        healthCheckExprs:
          - apiVersion: management.loft.sh/v1
            kind: VirtualClusterInstance
            failed: "status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')"
            current: "status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')"
        patches:
          - target:
              kind: VirtualClusterInstance
            patch: |
              - op: add
                path: /metadata/name
                value:
                  juliet-app-preview-flux-vcluster-<< inputs.id >>
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      metadata:
        name: juliet-app-preview-<< inputs.id >>
        namespace: p-auth-core
      spec:
        provider: generic # or 'github' if using GitHub App
        interval: 1h
        url: https://github.com/loft-demos/juliet-app
        ref:
          commit: << inputs.sha >>
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: preview-app
        namespace: p-auth-core
      spec:
        dependsOn:
          - name: juliet-app-preview-flux-vcluster-<< inputs.id >>
        interval: 1h
        retryInterval: 3m
        timeout: 5m
        prune: true
        wait: true
        path: ./vcluster-gitops/argocd/flux/flux-deploy-apps
        sourceRef:
          kind: GitRepository
          name: juliet-app-preview-<< inputs.id >>
        patches:
          - target:
              kind: HelmRepository
            patch: |
              - op: add
                path: /metadata/namespace
                value:
                  loft-auth-core-v-juliet-app-preview-flux-vcluster-<< inputs.id >>
          - target:
              kind: HelmRelease
            patch: |
              - op: add
                path: /metadata/namespace
                value:
                  loft-auth-core-v-juliet-app-preview-flux-vcluster-<< inputs.id >>
              - op: add
                path: /spec/kubeConfig
                value:
                  secretRef:
                    name: juliet-app-preview-flux-vcluster-<< inputs.id >>-flux-kubeconfig
              - op: add
                path: /spec/values
                value:
                  ui:
                    message: "deployed to vcluster-deployed-with-flux << inputs.sha >>"
              - op: add
                path: /spec/values/ingress
                value:
                  enabled: true
                  hosts:
                    - host: juliet-app-preview-flux-vcluster-<< inputs.id >>.us.demo.dev
                      paths:
                        - path: /
                          pathType: ImplementationSpecific
